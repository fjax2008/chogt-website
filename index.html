<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生管桶号管理</title>
    <meta name="theme-color" content="#1677ff">
    <meta http-equiv="refresh" content="0;url=https://barrel-management.onrender.com">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100dvh}
        .card{background:#fff;border-radius:16px;padding:40px 32px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08);max-width:360px;width:90%}
        .icon{font-size:48px;margin-bottom:16px}
        h1{font-size:20px;color:#1a1a2e;margin-bottom:8px}
        p{font-size:14px;color:#8c8c8c;margin-bottom:20px}
        .spinner{display:inline-block;width:20px;height:20px;border:3px solid #e8e8e8;border-top-color:#1677ff;border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        a{color:#1677ff;text-decoration:none;font-size:14px}
    </style>
    <script>window.location.replace('https://barrel-management.onrender.com');</script>
</head>
<body>
    <div class="card">
        <div class="icon">📦</div>
        <h1>生管桶号管理</h1>
        <p>正在跳转…</p>
        <div class="spinner"></div>
    </div>
</body>
</html>
