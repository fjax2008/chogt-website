<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="pageTitle">甜甜翻译 - 中越互译</title>
    <meta name="theme-color" content="#0a0e27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        /* ========== RESET & BASE ========== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #0a0e27;
            --bg-surface: rgba(255,255,255,0.06);
            --bg-card: rgba(255,255,255,0.08);
            --bg-card-hover: rgba(255,255,255,0.12);
            --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.08);
            --glass-border-strong: rgba(255,255,255,0.15);
            --text-primary: rgba(255,255,255,0.95);
            --text-secondary: rgba(255,255,255,0.6);
            --text-tertiary: rgba(255,255,255,0.35);
            --accent: #818cf8;
            --accent-glow: rgba(129,140,248,0.3);
            --accent-2: #c084fc;
            --accent-gradient: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            --success: #34d399;
            --warning: #fbbf24;
            --error: #f87171;
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --shadow-card: 0 8px 32px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
            --shadow-elevated: 0 16px 48px rgba(0,0,0,0.4);
            --transition-fast: 0.2s cubic-bezier(0.4,0,0.2,1);
            --transition-smooth: 0.35s cubic-bezier(0.4,0,0.2,1);
            --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
        }

        html { font-size: 16px; -webkit-text-size-adjust: 100%; }

        body {
            font-family: var(--font);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Ambient gradient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(129,140,248,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(192,132,252,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(52,211,153,0.04) 0%, transparent 40%);
            z-index: 0;
            pointer-events: none;
        }

        /* ========== LAYOUT ========== */
        .app {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px;
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }

        @media (min-width: 768px) {
            .app { max-width: 640px; padding: 0 24px; }
        }

        /* ========== TOP BAR ========== */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(to bottom, var(--bg-deep) 60%, transparent);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .lang-pills {
            display: flex;
            background: var(--bg-card);
            border-radius: 100px;
            padding: 3px;
            border: 1px solid var(--glass-border);
        }

        .lang-pill {
            padding: 6px 14px;
            border: none;
            border-radius: 100px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            letter-spacing: 0.02em;
        }

        .lang-pill.active {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        .top-actions { display: flex; gap: 8px; align-items: center; }

        .icon-action {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .icon-action:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--glass-border-strong);
        }

        .tip-btn {
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tip-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }

        /* ========== HEADER ========== */
        .header {
            text-align: center;
            padding: 24px 0 20px;
        }

        .brand {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 6px;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .date-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            padding: 4px 12px;
            background: var(--bg-card);
            border-radius: 100px;
            font-size: 0.72rem;
            color: var(--text-tertiary);
            border: 1px solid var(--glass-border);
        }

        /* ========== MODE TABS ========== */
        .mode-tabs {
            display: flex;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 4px;
            margin-bottom: 16px;
            border: 1px solid var(--glass-border);
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .mode-tabs::-webkit-scrollbar { display: none; }

        .mode-tab {
            flex: 1;
            min-width: 0;
            padding: 10px 6px;
            border: none;
            border-radius: calc(var(--radius-lg) - 2px);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-smooth);
            background: transparent;
            color: var(--text-tertiary);
            font-family: inherit;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .mode-tab.active {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .mode-tab:not(.active):hover { color: var(--text-secondary); }
        .mode-tab .tab-icon { font-size: 0.95rem; }

        /* ========== GLASS CARD ========== */
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: border-color var(--transition-fast);
        }

        .glass-card:hover { border-color: var(--glass-border-strong); }

        /* ========== TRANSLATE MODE ========== */
        .translate-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        @media (max-width: 480px) {
            .translate-grid { grid-template-columns: 1fr; gap: 10px; }
        }

        .translate-box {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color var(--transition-fast);
        }

        .translate-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .box-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid var(--glass-border);
        }

        .box-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px rgba(52,211,153,0.5);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        .translate-input {
            width: 100%;
            height: 130px;
            border: none;
            padding: 14px;
            font-size: 1rem;
            line-height: 1.7;
            resize: none;
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
        }

        .translate-input:focus { outline: none; }
        .translate-input::placeholder { color: var(--text-tertiary); }

        #output {
            background: rgba(255,255,255,0.02);
            cursor: text;
        }

        /* Loading */
        .loading-bar {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            margin-bottom: 12px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
        }

        .loading-bar.show { display: flex; }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--glass-border-strong);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 0.82rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Action Buttons */
        .action-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px var(--accent-glow);
        }

        .btn-primary:active { transform: scale(0.97); }

        .btn-ghost {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
        }

        .btn-ghost:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        /* ========== CAMERA MODE ========== */
        .camera-section { display: none; flex-direction: column; gap: 10px; }

        .camera-preview {
            width: 100%;
            aspect-ratio: 16/10;
            background: rgba(0,0,0,0.3);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px dashed var(--glass-border-strong);
            position: relative;
        }

        .camera-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .camera-placeholder {
            text-align: center;
            color: var(--text-tertiary);
        }

        .camera-placeholder .cam-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
            display: block;
            filter: grayscale(0.3);
        }

        .camera-placeholder p { font-size: 0.82rem; }

        .camera-actions { display: flex; gap: 8px; justify-content: center; }

        .ocr-result-card {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .ocr-result-card.show { display: block; }

        .ocr-title {
            padding: 10px 14px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--glass-border);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .ocr-body {
            padding: 14px;
            font-size: 0.92rem;
            line-height: 1.7;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            color: var(--text-primary);
        }

        .ocr-actions { padding: 10px 14px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid var(--glass-border); }

        /* ========== CONVERSATION MODE ========== */
        .convo-section { display: none; flex-direction: column; gap: 10px; }

        .convo-panel {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .convo-header {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
        }

        .convo-header.zh { background: linear-gradient(135deg, rgba(129,140,248,0.15), rgba(129,140,248,0.05)); }
        .convo-header.vi { background: linear-gradient(135deg, rgba(244,114,182,0.15), rgba(244,114,182,0.05)); }

        .convo-header-label {
            font-size: 0.82rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .convo-header-dir {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .convo-messages {
            height: 180px;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .convo-messages::-webkit-scrollbar { width: 3px; }
        .convo-messages::-webkit-scrollbar-thumb { background: var(--glass-border-strong); border-radius: 3px; }

        .convo-msg {
            max-width: 85%;
            animation: msgSlide 0.3s ease;
        }

        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .convo-msg.self { align-self: flex-end; }
        .convo-msg.other { align-self: flex-start; }

        .convo-msg-bubble {
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 0.88rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .convo-msg.self .convo-msg-bubble {
            background: var(--accent-gradient);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .convo-msg.other .convo-msg-bubble {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .convo-msg-time {
            font-size: 0.62rem;
            color: var(--text-tertiary);
            margin-top: 2px;
            padding: 0 4px;
        }

        .convo-msg.self .convo-msg-time { text-align: right; }

        .convo-empty {
            text-align: center;
            color: var(--text-tertiary);
            padding: 30px 0;
            font-size: 0.82rem;
        }

        .convo-input-row {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.1);
            align-items: flex-end;
        }

        .convo-input {
            flex: 1;
            height: 40px;
            max-height: 80px;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.9rem;
            font-family: inherit;
            resize: none;
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            outline: none;
            line-height: 1.4;
        }

        .convo-input:focus { border-color: var(--accent); }

        .convo-send {
            padding: 8px 16px;
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }

        .convo-send:hover { box-shadow: 0 4px 12px var(--accent-glow); }

        /* ========== CHATROOM MODE ========== */
        .chatroom-section { display: none; flex-direction: column; gap: 10px; flex: 1; min-height: 0; }

        .lobby-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 20px;
        }

        .lobby-title {
            font-size: 0.95rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 14px;
            color: var(--text-primary);
        }

        .lobby-field { margin-bottom: 10px; }

        .lobby-field input,
        .lobby-field select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            font-family: inherit;
            background: rgba(255,255,255,0.04);
            color: var(--text-primary);
            outline: none;
            transition: border-color var(--transition-fast);
        }

        .lobby-field input:focus,
        .lobby-field select:focus { border-color: var(--accent); }

        .lobby-field input::placeholder { color: var(--text-tertiary); }

        .lobby-field select option { background: #1a1e3a; color: #fff; }

        .lobby-divider {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.75rem;
            margin: 12px 0;
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lobby-divider::before, .lobby-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .chat-panel {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            height: calc(100dvh - 220px);
            max-height: 600px;
        }

        .chat-topbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
        }

        .chat-roomid {
            background: rgba(129,140,248,0.15);
            color: var(--accent);
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }

        .chat-roomid:hover { background: rgba(129,140,248,0.25); }

        .chat-user-pills {
            display: flex;
            gap: 4px;
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .chat-user-pills::-webkit-scrollbar { display: none; }

        .user-pill {
            padding: 2px 8px;
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .user-pill.me { background: rgba(52,211,153,0.15); color: var(--success); }
        .user-pill.other { background: rgba(255,255,255,0.08); color: var(--text-secondary); }

        .conn-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .conn-indicator.ok { background: var(--success); box-shadow: 0 0 8px rgba(52,211,153,0.5); }
        .conn-indicator.waiting { background: var(--warning); animation: breathe 1.5s ease-in-out infinite; }
        .conn-indicator.err { background: var(--error); }

        .leave-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-tertiary);
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .leave-btn:hover { background: rgba(248,113,113,0.1); color: var(--error); border-color: rgba(248,113,113,0.3); }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px 4px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin: 8px 0;
        }

        .chat-messages::-webkit-scrollbar { width: 3px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--glass-border-strong); border-radius: 3px; }

        .cr-msg {
            max-width: 82%;
            animation: msgSlide 0.25s ease;
        }

        .cr-msg.self { align-self: flex-end; }
        .cr-msg.other { align-self: flex-start; }

        .cr-sender {
            font-size: 0.6rem;
            font-weight: 600;
            margin-bottom: 1px;
            padding: 0 6px;
        }

        .cr-msg.self .cr-sender { text-align: right; color: rgba(52,211,153,0.7); }
        .cr-msg.other .cr-sender { color: rgba(129,140,248,0.7); }

        .cr-bubble {
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 0.88rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .cr-msg.self .cr-bubble {
            background: linear-gradient(135deg, #34d399, #2dd4bf);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .cr-msg.other .cr-bubble {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .cr-translated {
            font-size: 0.68rem;
            margin-top: 3px;
            padding-top: 3px;
            border-top: 1px solid rgba(255,255,255,0.1);
            opacity: 0.55;
            font-style: italic;
        }

        .cr-msg.self .cr-translated { border-top-color: rgba(255,255,255,0.15); }

        .cr-time {
            font-size: 0.55rem;
            opacity: 0.4;
            margin-top: 1px;
            padding: 0 6px;
        }

        .cr-msg.self .cr-time { text-align: right; }

        .cr-sys {
            align-self: center;
            font-size: 0.68rem;
            color: var(--text-tertiary);
            padding: 3px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 100px;
            margin: 4px 0;
        }

        .chat-inputbar {
            display: flex;
            gap: 6px;
            padding: 6px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            align-items: flex-end;
        }

        .chat-lang-toggle {
            padding: 6px 8px;
            background: rgba(129,140,248,0.12);
            color: var(--accent);
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
            align-self: center;
            border: none;
            font-family: inherit;
        }

        .chat-lang-toggle:hover { background: rgba(129,140,248,0.25); }

        .chat-textarea {
            flex: 1;
            height: 36px;
            max-height: 80px;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.88rem;
            font-family: inherit;
            resize: none;
            background: rgba(255,255,255,0.04);
            color: var(--text-primary);
            outline: none;
            line-height: 1.3;
        }

        .chat-send {
            padding: 6px 14px;
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition-fast);
            white-space: nowrap;
            align-self: center;
        }

        .chat-send:hover { box-shadow: 0 2px 10px var(--accent-glow); }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: rgba(20,24,60,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: #fff;
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 0.82rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
            z-index: 2000;
            border: 1px solid var(--glass-border-strong);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ========== MODAL ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1500;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: linear-gradient(160deg, #161a3a 0%, #1a1040 100%);
            border: 1px solid var(--glass-border-strong);
            border-radius: var(--radius-xl);
            padding: 28px 24px;
            max-width: 340px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-elevated);
            animation: modalPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
        }

        @keyframes modalPop {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-emoji { font-size: 2rem; margin-bottom: 8px; }

        .modal-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .modal-sub {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-bottom: 20px;
        }

        .modal-qr-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .modal-qr-item { text-align: center; }

        .modal-qr-frame {
            width: 130px;
            height: 130px;
            background: rgba(255,255,255,0.04);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-qr-item.wechat .modal-qr-frame { border: 2px solid rgba(52,211,153,0.3); }
        .modal-qr-item.alipay .modal-qr-frame { border: 2px solid rgba(129,140,248,0.3); }

        .modal-qr-frame img { width: 100%; height: 100%; object-fit: cover; }

        .modal-qr-label {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .modal-qr-item.wechat .modal-qr-label { color: var(--success); }
        .modal-qr-item.alipay .modal-qr-label { color: var(--accent); }

        .modal-hint {
            font-size: 0.72rem;
            color: var(--text-tertiary);
            margin-bottom: 16px;
        }

        .modal-close-btn {
            padding: 8px 28px;
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition-fast);
        }

        .modal-close-btn:hover { box-shadow: 0 4px 16px var(--accent-glow); }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            padding: 24px 0 16px;
            color: var(--text-tertiary);
            font-size: 0.72rem;
        }

        .footer a { color: var(--text-secondary); text-decoration: none; }
        .footer a:hover { color: var(--text-primary); }

        /* ========== HIDDEN FILE INPUTS ========== */
        .hidden-input { display: none; }

        /* ========== MOBILE ADJUSTMENTS ========== */
        @media (max-width: 480px) {
            .brand { font-size: 1.6rem; }
            .tagline { font-size: 0.78rem; }
            .translate-input { height: 100px; font-size: 0.92rem; }
            .convo-messages { height: 150px; }
            .modal { padding: 24px 20px; }
            .modal-qr-frame { width: 110px; height: 110px; }
            .btn { padding: 8px 16px; font-size: 0.8rem; }
            .mode-tab { padding: 8px 4px; font-size: 0.72rem; }
            .mode-tab .tab-icon { font-size: 0.85rem; }
        }

        /* ========== SCROLLBAR GLOBAL ========== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border-strong); border-radius: 4px; }

        /* ========== ANIMATIONS ========== */
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ocr loading */
        .ocr-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: var(--accent);
            font-size: 0.85rem;
        }

        .ocr-loading .spinner { width: 24px; height: 24px; border-width: 2.5px; }
    
        /* ===== Sponsor Banner ===== */
        .sponsor-banner {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,215,0,0.25);
            border-radius: 24px;
            padding: 6px 18px 6px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 380px;
            width: 90%;
            height: 38px;
            overflow: hidden;
            box-shadow: 0 2px 16px rgba(0,0,0,0.25);
        }
        .sponsor-banner .sb-icon { font-size: 16px; flex-shrink: 0; }
        .sponsor-banner .sb-label {
            font-size: 11px; font-weight: 700;
            color: rgba(255,215,0,0.85); letter-spacing: 1px; flex-shrink: 0;
        }
        .sponsor-banner .sb-track {
            flex: 1; overflow: hidden; position: relative; height: 24px;
        }
        .sponsor-item {
            position: absolute; white-space: nowrap; font-size: 12.5px;
            color: #fff; opacity: 0; transition: opacity 0.5s ease, transform 0.5s ease;
            transform: translateY(6px); display: flex; align-items: center;
            gap: 6px; line-height: 24px;
        }
        .sponsor-item.active { opacity: 1; transform: translateY(0); }
        .sponsor-item .si-name { font-weight: 600; color: #f0e68c; }
        .sponsor-item .si-amount { color: #ffd700; font-weight: 700; font-size: 12px; }

        /* ===== Sponsor Modal ===== */
        .sponsor-overlay {
            display: none; position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            justify-content: center; align-items: center;
        }
        .sponsor-overlay.show { display: flex; }
        .sponsor-modal {
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 18px; padding: 28px 24px 22px;
            width: 320px; max-width: 90%;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5); position: relative;
        }
        .sponsor-modal h3 {
            text-align: center; font-size: 17px; color: #ffd700;
            margin: 0 0 20px; letter-spacing: 1px;
        }
        .sponsor-modal .sm-close {
            position: absolute; top: 12px; right: 16px;
            background: none; border: none; color: rgba(255,255,255,0.4);
            font-size: 20px; cursor: pointer;
        }
        .sponsor-modal .sm-close:hover { color: #fff; }
        .sponsor-modal label {
            display: block; font-size: 12px; color: rgba(255,255,255,0.5);
            margin-bottom: 6px; margin-top: 14px;
        }
        .sponsor-modal label:first-of-type { margin-top: 0; }
        .sponsor-modal input, .sponsor-modal select {
            width: 100%; padding: 10px 12px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px; color: #fff; font-size: 14px;
            outline: none; box-sizing: border-box;
        }
        .sponsor-modal input:focus, .sponsor-modal select:focus {
            border-color: rgba(255,215,0,0.5);
        }
        .sponsor-modal select option { background: #1a1a2e; color: #fff; }
        .sm-presets { display: flex; gap: 8px; margin-top: 8px; }
        .sm-presets button {
            flex: 1; padding: 8px;
            background: rgba(255,215,0,0.08);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 8px; color: #ffd700;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .sm-presets button:hover, .sm-presets button.sel {
            background: rgba(255,215,0,0.2); border-color: rgba(255,215,0,0.5);
        }
        .sm-send {
            width: 100%; margin-top: 20px; padding: 12px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none; border-radius: 12px; color: #1a1a2e;
            font-size: 15px; font-weight: 700; cursor: pointer;
            letter-spacing: 1px; transition: transform 0.15s;
        }
        .sm-send:active { transform: scale(0.97); }
        .sm-toast {
            position: fixed; top: 60px; left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.8); color: #ffd700;
            padding: 10px 24px; border-radius: 24px;
            font-size: 14px; font-weight: 600; z-index: 600;
            opacity: 0; transition: all 0.3s ease; pointer-events: none;
        }
        .sm-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    </style>
</head>
<body>
    <!-- Sponsor Banner -->
    <div class="sponsor-banner" id="sponsorBanner">
        <span class="sb-icon">🏆</span>
        <span class="sb-label">SPONSOR</span>
        <div class="sb-track" id="sponsorTrack"></div>
    </div>

    <!-- Sponsor Modal -->
    <div class="sponsor-overlay" id="sponsorOverlay">
        <div class="sponsor-modal">
            <button class="sm-close" id="smClose">✕</button>
            <h3>☕ 请我喝杯咖啡</h3>
            <label>昵称</label>
            <input type="text" id="smName" placeholder="你的名字" maxlength="20">
            <label>币种</label>
            <select id="smCurrency">
                <option value="CNY">CNY 人民币</option>
                <option value="VND">VND 越南盾</option>
            </select>
            <label>金额</label>
            <div class="sm-presets" id="smPresets">
                <button data-amt="10">¥10</button>
                <button data-amt="20" class="sel">¥20</button>
                <button data-amt="50">¥50</button>
                <button data-amt="100">¥100</button>
            </div>
            <input type="number" id="smAmount" placeholder="自定义金额" style="margin-top:8px" min="1">
            <button class="sm-send" id="smSend">💖 发送赞助</button>
        </div>
    </div>
    <div class="sm-toast" id="smToast"></div>

    <div class="app">
        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="lang-pills">
                <button class="lang-pill active" onclick="switchLang('zh')">中文</button>
                <button class="lang-pill" onclick="switchLang('vi')">Tiếng Việt</button>
            </div>
            <div class="top-actions">
                <button class="tip-btn" onclick="openTipModal()">☕ <span data-i18n="tip">打赏</span></button>
            </div>
        </div>

        <!-- HEADER -->
        <header class="header fade-in">
            <h1 class="brand" data-i18n="logo">甜甜翻译</h1>
            <p class="tagline" data-i18n="subtitle">中文 ⇄ 越南语 · 智能互译</p>
            <div class="date-badge" id="dateDisplay"></div>
        </header>

        <!-- MODE TABS -->
        <div class="mode-tabs">
            <button class="mode-tab active" onclick="setMode('translate')" data-mode="translate">
                <span class="tab-icon">📝</span> <span data-i18n="modeTranslate">翻译</span>
            </button>
            <button class="mode-tab" onclick="setMode('camera')" data-mode="camera">
                <span class="tab-icon">📷</span> <span data-i18n="modeCamera">拍照</span>
            </button>
            <button class="mode-tab" onclick="setMode('conversation')" data-mode="conversation">
                <span class="tab-icon">💬</span> <span data-i18n="modeChat">对话</span>
            </button>
            <button class="mode-tab" onclick="setMode('chatroom')" data-mode="chatroom">
                <span class="tab-icon">🏠</span> <span data-i18n="modeChatroom">聊天室</span>
            </button>
        </div>

        <!-- ===== TRANSLATE MODE ===== -->
        <div id="translateMode" class="fade-in">
            <div class="translate-grid">
                <div class="translate-box">
                    <div class="box-header">
                        <span class="box-label" id="inputLabel" data-i18n="inputLabel">输入</span>
                        <span class="status-dot"></span>
                    </div>
                    <textarea class="translate-input" id="input" placeholder="粘贴文本，自动检测语言…" data-i18n-placeholder="inputPlaceholder"></textarea>
                </div>
                <div class="translate-box">
                    <div class="box-header">
                        <span class="box-label" id="outputLabel" data-i18n="outputLabel">翻译结果</span>
                        <span class="status-dot"></span>
                    </div>
                    <textarea class="translate-input" id="output" readonly placeholder="翻译结果将显示在这里…" data-i18n-placeholder="outputPlaceholder"></textarea>
                </div>
            </div>

            <div class="loading-bar" id="loading">
                <div class="spinner"></div>
                <span class="loading-text" data-i18n="translating">正在翻译…</span>
            </div>

            <div class="action-row">
                <button class="btn btn-primary" onclick="translateText()" data-i18n="btnTranslate">🌐 翻译</button>
                <button class="btn btn-ghost" onclick="copyResult()" data-i18n="btnCopy">📋 复制</button>
                <button class="btn btn-ghost" onclick="clearAll()" data-i18n="btnClear">🗑️ 清空</button>
            </div>
        </div>

        <!-- ===== CAMERA MODE ===== -->
        <div id="cameraMode" class="camera-section">
            <div class="glass-card">
                <div class="camera-preview" id="cameraPreview">
                    <div class="camera-placeholder" id="cameraPlaceholder">
                        <span class="cam-icon">📷</span>
                        <p data-i18n="cameraTip">点击下方按钮选择图片或拍照</p>
                    </div>
                </div>
                <div style="padding:12px; display:flex; gap:8px; justify-content:center;">
                    <button class="btn btn-ghost" onclick="selectImage()">📁 选择图片</button>
                    <button class="btn btn-primary" onclick="takePhoto()">📸 拍照</button>
                </div>
                <input type="file" class="hidden-input" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
                <input type="file" class="hidden-input" id="cameraInput" accept="image/*" capture="environment" onchange="handleImageSelect(event)">
            </div>

            <div class="ocr-result-card" id="ocrResultBox">
                <div class="ocr-title" data-i18n="ocrTitle">翻译结果</div>
                <div class="ocr-body" id="ocrResult"></div>
                <div class="ocr-actions">
                    <button class="btn btn-ghost" onclick="copyOcrResult()">📋 复制</button>
                    <button class="btn btn-ghost" onclick="resetCamera()">🔄 重新识别</button>
                </div>
            </div>
        </div>

        <!-- ===== CONVERSATION MODE ===== -->
        <div id="conversationMode" class="convo-section">
            <div class="convo-panel">
                <div class="convo-header zh">
                    <span class="convo-header-label">🇨🇳 <span data-i18n="yourChat">你的对话</span></span>
                    <span class="convo-header-dir" data-i18n="chatDirectionZh">中文 → 越南语</span>
                </div>
                <div class="convo-messages" id="zhMessages">
                    <div class="convo-empty" data-i18n="zhChatTip">👆 在这里输入中文</div>
                </div>
                <div class="convo-input-row">
                    <textarea class="convo-input" id="zhInput" placeholder="输入中文…"></textarea>
                    <button class="convo-send" onclick="sendZhMessage()" data-i18n="btnSend">发送</button>
                </div>
            </div>

            <div class="convo-panel">
                <div class="convo-header vi">
                    <span class="convo-header-label">🇻🇳 <span data-i18n="viChat">越南朋友</span></span>
                    <span class="convo-header-dir" data-i18n="chatDirectionVi">越南语 → 中文</span>
                </div>
                <div class="convo-messages" id="viMessages">
                    <div class="convo-empty" data-i18n="viChatTip">👆 越南朋友的回复</div>
                </div>
                <div class="convo-input-row">
                    <textarea class="convo-input" id="viInput" placeholder="Nhập tiếng Việt…"></textarea>
                    <button class="convo-send" onclick="sendViMessage()">Gửi</button>
                </div>
            </div>
        </div>

        <!-- ===== CHATROOM MODE ===== -->
        <div id="chatroomMode" class="chatroom-section">
            <!-- LOBBY -->
            <div id="chatLobby">
                <div class="lobby-card fade-in">
                    <div class="lobby-title" data-i18n="lobbyCreate">🎯 创建新房间</div>
                    <div class="lobby-field">
                        <input type="text" id="createName" placeholder="你的昵称（留空自动生成）" maxlength="20" data-i18n-placeholder="lobbyNickname">
                    </div>
                    <div class="lobby-field">
                        <select id="createLang">
                            <option value="zh">🇨🇳 中文</option>
                            <option value="vi">🇻🇳 Tiếng Việt</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="crCreateRoom()" style="width:100%" data-i18n="lobbyCreateBtn">🚀 创建房间</button>
                </div>

                <div class="lobby-divider" data-i18n="lobbyOr">或者加入已有房间</div>

                <div class="lobby-card fade-in">
                    <div class="lobby-title" data-i18n="lobbyJoin">🔑 加入房间</div>
                    <div class="lobby-field">
                        <input type="text" id="joinRoomId" placeholder="输入6位房间号" maxlength="6" inputmode="numeric" data-i18n-placeholder="lobbyRoomId">
                    </div>
                    <div class="lobby-field">
                        <input type="text" id="joinName" placeholder="你的昵称（留空自动生成）" maxlength="20" data-i18n-placeholder="lobbyNickname">
                    </div>
                    <div class="lobby-field">
                        <select id="joinLang">
                            <option value="zh">🇨🇳 中文</option>
                            <option value="vi">🇻🇳 Tiếng Việt</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="crJoinRoom()" style="width:100%" data-i18n="lobbyJoinBtn">🚪 加入房间</button>
                </div>
            </div>

            <!-- CHAT PANEL -->
            <div id="chatPanel" class="chat-panel">
                <div class="chat-topbar">
                    <div class="chat-roomid" onclick="crCopyRoom()" title="点击复制房间号">
                        房间 <span id="chatRoomId">------</span>
                    </div>
                    <div class="chat-user-pills" id="chatUsers"></div>
                    <div class="conn-indicator waiting" id="chatConn"></div>
                    <button class="leave-btn" onclick="crLeave()" title="离开">✕</button>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-inputbar">
                    <button class="chat-lang-toggle" id="chatLangTag" onclick="crCycleLang()" title="切换语言">中</button>
                    <textarea class="chat-textarea" id="chatInput" placeholder="输入消息…" rows="1"></textarea>
                    <button class="chat-send" onclick="crSend()">发送</button>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <p data-i18n="footer">微信号：D399HV · <a href="#">鹏哥提供</a> © 2026</p>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- TIP MODAL -->
    <div class="modal-overlay" id="tipModal" onclick="closeTipModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-emoji">☕</div>

                footer: 'WeChat: D399HV · <a href="#">Thiết kế Phong</a> © 2026',

                toastError: 'Dịch thất bại, thử lại',
                toastInputError: 'Vui lòng nhập văn bản',
                toastSentVi: 'Đã gửi ✓',
                toastReceivedVi: 'Đã nhận ✓',
                chatRoomIdCopied: 'Đã sao chép mã phòng',
                chatUserJoined: 'đã tham gia',
                chatUserLeft: 'đã rời phòng',
                chatLangSwitched: 'Đã chuyển sang Tiếng Việt',
            }
        };

        let currentLang = 'zh';
        try { currentLang = localStorage.getItem('chogt-lang') || 'zh'; } catch(_) {}

        function switchLang(lang) {
            currentLang = lang;
            try { localStorage.setItem('chogt-lang', lang); } catch(_) {}

            document.querySelectorAll('.lang-pill').forEach(btn => {
                btn.classList.toggle('active',
                    (lang === 'zh' && btn.textContent.includes('中')) ||
                    (lang === 'vi' && btn.textContent.includes('Việt'))
                );
            });

            updatePageText();
            updatePlaceholders();
            updateDate();
            showToast(lang === 'zh' ? '已切换为中文' : 'Đã chuyển sang Tiếng Việt');
        }

        function updatePageText() {
            const t = i18n[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    if (el.tagName === 'TITLE') document.title = t[key];
                    else el.innerHTML = t[key];
                }
            });
        }

        function updatePlaceholders() {
            const t = i18n[currentLang];
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) el.placeholder = t[key];
            });
        }

        function updateDate() {
            const now = new Date();
            const el = document.getElementById('dateDisplay');
            if (!el) return;
            if (currentLang === 'zh') {
                const days = ['周日','周一','周二','周三','周四','周五','周六'];
                const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
                el.textContent = `${days[now.getDay()]} ${months[now.getMonth()]}${now.getDate()}日`;
            } else {
                const days = ['CN','T2','T3','T4','T5','T6','T7'];
                const months = ['Th1','Th2','Th3','Th4','Th5','Th6','Th7','Th8','Th9','Th10','Th11','Th12'];
                el.textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
            }
        }

        // ========== INIT ==========
        document.addEventListener('DOMContentLoaded', () => {
            updatePageText();
            updatePlaceholders();
            updateDate();
            initApp();

            // chat input auto-resize + enter send
            const ci = document.getElementById('chatInput');
            ci.addEventListener('input', () => { ci.style.height = '36px'; ci.style.height = Math.min(ci.scrollHeight, 80) + 'px'; });
            ci.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); crSend(); } });

            // URL param auto-join
            const p = new URLSearchParams(location.search).get('room');
            if (p && p.length === 6) document.getElementById('joinRoomId').value = p;
        });

        // ========== MODE SWITCH ==========
        function setMode(mode) {
            document.querySelectorAll('.mode-tab').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
            document.getElementById('translateMode').style.display = mode === 'translate' ? 'block' : 'none';
            document.getElementById('cameraMode').style.display = mode === 'camera' ? 'flex' : 'none';
            document.getElementById('conversationMode').style.display = mode === 'conversation' ? 'flex' : 'none';
            document.getElementById('chatroomMode').style.display = mode === 'chatroom' ? 'flex' : 'none';
        }

        // ========== TRANSLATE ==========
        let inputEl, outputEl, loadingEl;
        let debounceTimer = null, lastText = '';

        function initApp() {
            inputEl = document.getElementById('input');
            outputEl = document.getElementById('output');
            loadingEl = document.getElementById('loading');

            inputEl.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                const text = inputEl.value.trim();
                if (!text) { outputEl.value = ''; lastText = ''; return; }
                if (text === lastText) return;
                lastText = text;
                debounceTimer = setTimeout(() => translateText(), 800);
            });

            inputEl.addEventListener('paste', () => {
                setTimeout(() => {
                    const text = inputEl.value.trim();
                    if (text && text !== lastText) { lastText = text; translateText(); }
                }, 100);
            });
        }

        const DEEPSEEK_API_KEY = 'sk-b234f5da203f4eb592ed460f2b03bdf9';

        async function callDeepSeek(system, user) {
            const r = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
                body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'system', content: system }, { role: 'user', content: user }], temperature: 0.3, max_tokens: 2000 })
            });
            if (!r.ok) throw new Error('API error');
            const d = await r.json();
            return d.choices[0].message.content.trim();
        }

        function detectLanguage(text) {
            if (/[\u4e00-\u9fff]/.test(text)) return 'zh';
            if (/[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/i.test(text)) return 'vi';
            return 'zh';
        }

        async function translateText() {
            const text = inputEl.value.trim();
            if (!text) { showToast(i18n[currentLang].toastInputError); return; }

            const src = detectLanguage(text);
            const tgt = src === 'zh' ? 'vi' : 'zh';
            loadingEl.classList.add('show');

            const langMap = { zh: '简体中文', vi: '越南语' };
            try {
                const result = await callDeepSeek(
                    '你是一个资深中越翻译专家，长期生活在越南，精通中越两国语言文化。',
                    `请将以下${langMap[src]}翻译成${langMap[tgt]}。翻译准确自然流畅。只输出翻译结果：\n${text}`
                );
                outputEl.value = result;
                copyToClipboard(result);
                showToast('翻译完成，已自动复制！');
            } catch (e) {
                showToast(i18n[currentLang].toastError);
            } finally {
                loadingEl.classList.remove('show');
            }
        }

        function copyResult() {
            const t = outputEl.value.trim();
            if (!t) { showToast(i18n[currentLang].toastEmpty); return; }
            copyToClipboard(t);
            showToast(i18n[currentLang].toastCopied);
        }

        function copyToClipboard(t) {
            navigator.clipboard.writeText(t).catch(() => {});
        }

        function clearAll() {
            inputEl.value = ''; outputEl.value = ''; lastText = '';
            showToast(i18n[currentLang].toastCleared);
        }

        // ========== CAMERA ==========
        let currentImageData = null;

        function selectImage() { document.getElementById('imageInput').click(); }
        function takePhoto() { document.getElementById('cameraInput').click(); }

        function handleImageSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                currentImageData = ev.target.result;
                document.getElementById('cameraPreview').innerHTML = `<img src="${currentImageData}" alt="preview">`;
                performOCR();
            };
            reader.readAsDataURL(file);
        }

        async function performOCR() {
            if (!currentImageData) return;
            const resultBox = document.getElementById('ocrResultBox');
            const resultEl = document.getElementById('ocrResult');
            const preview = document.getElementById('cameraPreview');
            preview.innerHTML = '<div class="ocr-loading"><div class="spinner"></div>正在识别…</div>';
            try {
                const prompt = currentLang === 'zh'
                    ? '请识别图片中的文字并翻译成中文，只输出翻译结果。'
                    : '请识别图片中的文字并翻译成越南语，只输出翻译结果。';
                const r = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
                    body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: [{ type: 'image_url', image_url: { url: currentImageData } }, { type: 'text', text: prompt }] }] })
                });
                const d = await r.json();
                if (!r.ok) throw new Error();
                preview.innerHTML = `<img src="${currentImageData}" alt="preview">`;
                resultBox.classList.add('show');
                resultEl.textContent = d.choices[0].message.content.trim() || '未识别到文字';
                showToast('识别完成！');
            } catch (err) {
                preview.innerHTML = '<div class="ocr-loading" style="color:var(--error)">😢 识别失败，请重试</div>';
            }
        }

        function copyOcrResult() {
            navigator.clipboard.writeText(document.getElementById('ocrResult').textContent).then(() => showToast(i18n[currentLang].toastCopied));
        }

        function resetCamera() {
            currentImageData = null;
            document.getElementById('cameraPreview').innerHTML = '<div class="camera-placeholder"><span class="cam-icon">📷</span><p>' + i18n[currentLang].cameraTip + '</p></div>';
            document.getElementById('ocrResultBox').classList.remove('show');
            document.getElementById('imageInput').value = '';
            document.getElementById('cameraInput').value = '';
        }

        // ========== CONVERSATION ==========
        async function sendZhMessage() {
            const input = document.getElementById('zhInput');
            const text = input.value.trim();
            if (!text) return;
            addConvoMsg('zh', text, true);
            input.value = '';
            try {
                const t = await callDeepSeek('资深中越翻译专家', '将以下简体中文翻译成越南语，只输出翻译结果：\n' + text);
                addConvoTranslated('vi', t);
            } catch { showToast(i18n[currentLang].toastError); }
        }

        async function sendViMessage() {
            const input = document.getElementById('viInput');
            const text = input.value.trim();
            if (!text) return;
            addConvoMsg('vi', text, true);
            input.value = '';
            try {
                const t = await callDeepSeek('资深中越翻译专家', '将以下越南语翻译成简体中文，只输出翻译结果：\n' + text);
                addConvoTranslated('zh', t);
            } catch { showToast(i18n[currentLang].toastError); }
        }

        function addConvoMsg(type, text, self) {
            const box = document.getElementById(type === 'zh' ? 'zhMessages' : 'viMessages');
            const empty = box.querySelector('.convo-empty');
            if (empty) empty.remove();

            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.className = `convo-msg ${self ? 'self' : 'other'}`;
            div.innerHTML = `<div class="convo-msg-bubble">${esc(text)}</div><div class="convo-msg-time">${time}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function addConvoTranslated(type, text) {
            addConvoMsg(type, '📤 ' + text, true);
            showToast(i18n[type === 'vi' ? 'currentLang' : 'currentLang'].toastSentVi || '已发送 ✓');
            showToast(type === 'vi' ? i18n[currentLang].toastSentVi : i18n[currentLang].toastReceivedVi);
        }

        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        // ========== CHATROOM ==========
        let crWs = null, crUserId = null, crUsername = '', crLang = 'zh', crRoomId = '';

        function crConnect(onOpen) {
            const WS_HOST = window.CHAT_WS_HOST || 'wss://chogt-chatroom.onrender.com';
            crWs = new WebSocket(WS_HOST);
            crWs.onopen = () => { crSetConn('ok'); onOpen(); };
            crWs.onmessage = e => crHandle(JSON.parse(e.data));
            crWs.onclose = () => {
                crSetConn('err');
                if (document.getElementById('chatPanel').style.display !== 'none') {
                    setTimeout(() => {
                        showToast('正在重新连接…');
                        crConnect(() => crWs.send(JSON.stringify({ type: 'join-room', roomId: crRoomId, username: crUsername, lang: crLang })));
                    }, 3000);
                }
            };
            crWs.onerror = () => crSetConn('err');
        }

        function crHandle(msg) {
            switch (msg.type) {
                case 'room-created':
                    crRoomId = msg.roomId; crUserId = msg.userId; crUsername = msg.username;
                    crEnter(msg.users);
                    crSys(`房间已创建：${crRoomId}，分享给朋友一起聊天吧！`);
                    break;
                case 'room-joined':
                    crRoomId = msg.roomId; crUserId = msg.userId; crUsername = msg.username;
                    crEnter(msg.users);
                    crSys(`已加入房间 ${crRoomId}`);
                    break;
                case 'user-joined': crUsers(msg.users); crSys(`${msg.username} ${i18n[currentLang].chatUserJoined}`); break;
                case 'user-left': crUsers(msg.users); crSys(`${msg.username} ${i18n[currentLang].chatUserLeft}`); break;
                case 'message': crMsg(msg); break;
                case 'error': showToast(msg.message); break;
            }
        }

        function crCreateRoom() {
            const name = document.getElementById('createName').value.trim();
            crLang = document.getElementById('createLang').value;
            crConnect(() => crWs.send(JSON.stringify({ type: 'create-room', username: name, lang: crLang })));
        }

        function crJoinRoom() {
            const id = document.getElementById('joinRoomId').value.trim();
            if (!id || id.length !== 6) { showToast('请输入6位房间号'); return; }
            const name = document.getElementById('joinName').value.trim();
            crLang = document.getElementById('joinLang').value;
            crRoomId = id;
            crConnect(() => crWs.send(JSON.stringify({ type: 'join-room', roomId: id, username: name, lang: crLang })));
        }

        function crEnter(users) {
            document.getElementById('chatLobby').style.display = 'none';
            const panel = document.getElementById('chatPanel');
            panel.style.display = 'flex';
            panel.style.flexDirection = 'column';
            panel.style.flex = '1';
            document.getElementById('chatRoomId').textContent = crRoomId;
            crUsers(users);
            crUpdateTag();
            // 监听软键盘弹出/收起，自动滚动到最新消息
            if (window.visualViewport) {
                window.visualViewport.removeEventListener('resize', crOnViewportResize);
                window.visualViewport.addEventListener('resize', crOnViewportResize);
            }
            document.getElementById('chatInput').focus();
        }

        function crOnViewportResize() {
            const box = document.getElementById('chatMessages');
            if (box) {
                requestAnimationFrame(() => { box.scrollTop = box.scrollHeight; });
            }
        }

        function crUsers(users) {
            document.getElementById('chatUsers').innerHTML = users.map(u => {
                const me = u.id === crUserId;
                const flag = u.lang === 'vi' ? '🇻🇳' : '🇨🇳';
                return `<span class="user-pill ${me ? 'me' : 'other'}">${flag} ${esc(u.username)}${me ? ' (我)' : ''}</span>`;
            }).join('');
        }

        function crMsg(msg) {
            const box = document.getElementById('chatMessages');
            const self = msg.userId === crUserId;
            const div = document.createElement('div');
            div.className = `cr-msg ${self ? 'self' : 'other'}`;
            const time = new Date(msg.time).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            const flag = msg.sourceLang === 'vi' ? '🇻🇳' : '🇨🇳';
            let body;
            if (self) {
                body = `<div class="cr-bubble">${esc(msg.original)}</div>`;
            } else {
                const diff = msg.translated !== msg.original;
                body = `<div class="cr-bubble">${esc(msg.translated)}${diff ? `<div class="cr-translated">📎 ${flag} ${esc(msg.original)}</div>` : ''}</div>`;
            }
            div.innerHTML = `${self ? '' : `<div class="cr-sender">${flag} ${esc(msg.username)}</div>`}${body}<div class="cr-time">${time}</div>`;
            box.appendChild(div);
            requestAnimationFrame(() => {
                box.scrollTop = box.scrollHeight;
            });
        }

        function crSys(text) {
            const d = document.createElement('div');
            d.className = 'cr-sys';
            document.getElementById('chatMessages').appendChild(d);
            d.textContent = text;
            requestAnimationFrame(() => {
                const m = document.getElementById('chatMessages');
                m.scrollTop = m.scrollHeight;
            });
        }

        function crSend() {
            const inp = document.getElementById('chatInput');
            const text = inp.value.trim();
            if (!text || !crWs || crWs.readyState !== 1) return;
            crWs.send(JSON.stringify({ type: 'message', text }));
            inp.value = '';
            inp.style.height = '36px';
            // 先滚动到底部，再恢复焦点
            const box = document.getElementById('chatMessages');
            requestAnimationFrame(() => {
                box.scrollTop = box.scrollHeight;
            });
            inp.focus();
        }

        function crLeave() {
            if (crWs) crWs.close();
            document.getElementById('chatPanel').style.display = 'none';
            document.getElementById('chatLobby').style.display = 'block';
            document.getElementById('chatMessages').innerHTML = '';
            crRoomId = ''; crUserId = null;
            if (window.visualViewport) {
                window.visualViewport.removeEventListener('resize', crOnViewportResize);
            }
        }

        function crCopyRoom() {
            navigator.clipboard.writeText(crRoomId).then(() => showToast(`${i18n[currentLang].chatRoomIdCopied}: ${crRoomId}`));
        }

        function crCycleLang() {
            crLang = crLang === 'zh' ? 'vi' : 'zh';
            crUpdateTag();
            if (crWs && crWs.readyState === 1) crWs.send(JSON.stringify({ type: 'update-lang', lang: crLang }));
            showToast(i18n[currentLang].chatLangSwitched);
        }

        function crUpdateTag() {
            document.getElementById('chatLangTag').textContent = crLang === 'zh' ? '中' : 'Vi';
        }

        function crSetConn(s) {
            const el = document.getElementById('chatConn');
            el.className = `conn-indicator ${s}`;
        }

        // ========== TOAST ==========
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 2200);
        }

        // ========== MODAL ==========
        function openTipModal() { document.getElementById('tipModal').classList.add('show'); }
        function closeTipModal(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('tipModal').classList.remove('show');
        }
    

// ===== Sponsor Banner Logic =====
const SPONSORS_CN = [
    { name: '邓永威', fixed: true },
    { name: '和平', fixed: true },
    { name: '伯贤', fixed: true },
    { name: '阿天', fixed: true },
    { name: '德平', fixed: true },
    { name: '述熹', fixed: true }
];
const SPONSORS_VN = [
    'Nguyễn Văn Hùng', 'Trần Minh Tuấn', 'Lê Thị Mai',
    'Phạm Quốc Bảo', 'Hoàng Anh Đức', 'Võ Thanh Tùng'
];
const RANDOM_NAMES = ['小明', '阿杰', 'Lucas', 'Yuki', '小林', 'Sakura', '大伟', 'Mina', '志豪', 'Emily'];

function genSponsorList() {
    const list = [];
    SPONSORS_CN.forEach(s => {
        const amt = Math.floor(Math.random() * 201) + 100;
        list.push({ name: s.name, amount: '¥' + amt, sort: Math.random() });
    });
    const vnCount = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < vnCount; i++) {
        const n = SPONSORS_VN[Math.floor(Math.random() * SPONSORS_VN.length)];
        const amt = (Math.floor(Math.random() * 50001) + 50000).toLocaleString();
        list.push({ name: n, amount: amt + ' VND', sort: Math.random() });
    }
    const rndCount = 3 + Math.floor(Math.random() * 3);
    for (let i = 0; i < rndCount; i++) {
        const n = RANDOM_NAMES[Math.floor(Math.random() * RANDOM_NAMES.length)];
        const amt = Math.floor(Math.random() * 41) + 10;
        list.push({ name: n, amount: '¥' + amt, sort: Math.random() });
    }
    list.sort((a, b) => a.sort - b.sort);
    return list;
}

let sponsorIdx = 0;
let sponsorTimer = null;
let sponsorList = [];

function renderSponsorItem(s) {
    return '<span class="si-name">' + s.name + '</span><span class="si-amount">' + s.amount + '</span>';
}

function showSponsor(idx) {
    const items = document.querySelectorAll('.sponsor-item');
    items.forEach(el => el.classList.remove('active'));
    if (items[idx]) items[idx].classList.add('active');
}

function initSponsorBanner() {
    sponsorList = genSponsorList();
    const track = document.getElementById('sponsorTrack');
    if (!track) return;
    track.innerHTML = '';
    sponsorList.forEach((s, i) => {
        const d = document.createElement('div');
        d.className = 'sponsor-item' + (i === 0 ? ' active' : '');
        d.innerHTML = renderSponsorItem(s);
        track.appendChild(d);
    });
    sponsorIdx = 0;
    if (sponsorTimer) clearInterval(sponsorTimer);
    sponsorTimer = setInterval(() => {
        sponsorIdx = (sponsorIdx + 1) % sponsorList.length;
        showSponsor(sponsorIdx);
    }, 3000);
}

// Sponsor modal
const smOverlay = document.getElementById('sponsorOverlay');
const smClose = document.getElementById('smClose');
const smSend = document.getElementById('smSend');
const smCurrency = document.getElementById('smCurrency');
const smPresets = document.getElementById('smPresets');
const smAmount = document.getElementById('smAmount');
const smName = document.getElementById('smName');
const smToast = document.getElementById('smToast');

document.getElementById('sponsorBanner').addEventListener('click', () => {
    smOverlay.classList.add('show');
});

smClose.addEventListener('click', () => smOverlay.classList.remove('show'));
smOverlay.addEventListener('click', e => {
    if (e.target === smOverlay) smOverlay.classList.remove('show');
});

smCurrency.addEventListener('change', () => {
    const isVND = smCurrency.value === 'VND';
    const presets = isVND
        ? [{ l: '50K', v: 50000 }, { l: '100K', v: 100000 }, { l: '200K', v: 200000 }, { l: '500K', v: 500000 }]
        : [{ l: '¥10', v: 10 }, { l: '¥20', v: 20 }, { l: '¥50', v: 50 }, { l: '¥100', v: 100 }];
    smPresets.innerHTML = presets.map((p, i) =>
        '<button data-amt="' + p.v + '"' + (i === 1 ? ' class="sel"' : '') + '>' + p.l + '</button>'
    ).join('');
    smAmount.value = '';
    smAmount.placeholder = isVND ? '自定义金额 (VND)' : '自定义金额';
    bindPresets();
});

function bindPresets() {
    smPresets.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
            smPresets.querySelectorAll('button').forEach(b => b.classList.remove('sel'));
            btn.classList.add('sel');
            smAmount.value = btn.dataset.amt;
        });
    });
}
bindPresets();

smSend.addEventListener('click', () => {
    const name = smName.value.trim() || '匿名好心人';
    let amount = smAmount.value.trim();
    if (!amount) {
        const sel = smPresets.querySelector('.sel');
        amount = sel ? sel.dataset.amt : '20';
    }
    const cur = smCurrency.value;
    const disp = cur === 'VND' ? parseInt(amount).toLocaleString() + ' VND' : '¥' + amount;
    // Add to sponsor list
    const newItem = { name, amount: disp };
    sponsorList.push(newItem);
    const track = document.getElementById('sponsorTrack');
    const d = document.createElement('div');
    d.className = 'sponsor-item';
    d.innerHTML = renderSponsorItem(newItem);
    track.appendChild(d);
    // Show toast
    smToast.textContent = '💖 感谢 ' + name + ' 赞助 ' + disp + '！';
    smToast.classList.add('show');
    setTimeout(() => smToast.classList.remove('show'), 2500);
    smOverlay.classList.remove('show');
    // Reset form
    smName.value = '';
    smAmount.value = '';
});

// Init sponsor on load
document.addEventListener("DOMContentLoaded", initSponsorBanner);

    </script>
